<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Campus Leadership</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background:
          radial-gradient(circle at top left, #142850 0%, #0f172a 45%), #0f172a;

        background-attachment: fixed;

        color: white;

        font-family: Arial, sans-serif;

        overflow-x: hidden;
      }

      .page {
        max-width: 1300px;

        margin: auto;

        padding: 70px 40px 120px;
      }

      .topbar {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin-bottom: 70px;
      }

      h1 {
        font-size: 64px;

        color: white;
      }

      .back-link {
        color: #8b7cff;

        text-decoration: none;

        font-size: 22px;

        transition: 0.3s;
      }

      .back-link:hover {
        opacity: 0.8;
      }

      .container {
        display: flex;

        justify-content: center;
      }

      img {
        width: auto;

        max-width: 100%;

        max-height: 80vh;

        border-radius: 18px;

        box-shadow: 0 0 40px rgba(0, 0, 0, 0.45);

        transition: transform 0.3s ease;

        cursor: zoom-in;

        transform-origin: top center;
      }

      img.zoomed {
        transform: scale(1.5);

        cursor: zoom-out;
      }

      @media (max-width: 900px) {
        h1 {
          font-size: 46px;
        }

        .page {
          padding: 40px 24px 90px;
        }

        .topbar {
          margin-bottom: 40px;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="topbar">
        <h1>Campus Leadership</h1>

        <a class="back-link" href="index.html" onclick="goBack(event)">
          ← Back
        </a>

        <script>
          function goBack(event) {
            event.preventDefault();

            const referrer = document.referrer;

            // 只有上一页来自你自己的网站时，才执行浏览器返回
            if (
              referrer &&
              new URL(referrer).origin === window.location.origin
            ) {
              window.history.back();
            } else {
              window.location.href = "index.html";
            }
          }
        </script>
      </div>

      <div class="container">
        <img
          id="leadershipImage"
          src="campus_leadership.jpeg"
          alt="Campus Leadership"
        />
      </div>
    </div>

    <script>
      const image = document.getElementById("leadershipImage");

      image.onclick = () => {
        image.classList.toggle("zoomed");
      };
    </script>
  </body>
</html>
