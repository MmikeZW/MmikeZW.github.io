<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>English Teaching</title>

    <style>

        body {

            margin: 0;

            background-color: #0f172a;

            font-family: Arial, sans-serif;

            overflow-x: hidden;
        }

        .container {

            width: 100%;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: flex-start;

            padding: 100px 20px;
        }

        img {

            max-height: calc(100vh - 160px);

            width: auto;

            max-width: 90%;

            height: auto;

            border-radius: 24px;

            box-shadow: 0 0 40px rgba(0,0,0,0.5);

            cursor: zoom-in;

            transition: transform 0.3s ease;

            transform-origin: top center;
        }

        img.zoomed {

            transform: scale(1.5);

            cursor: zoom-out;
        }

        .back {

            position: fixed;

            top: 30px;

            left: 30px;

            text-decoration: none;

            color: white;

            border: 1px solid white;

            padding: 14px 24px;

            border-radius: 12px;

            transition: 0.3s;

            z-index: 1000;
        }

        .back:hover {

            background-color: white;

            color: black;
        }

    </style>

</head>

<body>

    <a class="back" href="index.html">

        ← Back

    </a>

    <div class="container">

        <img 
            id="proofImage"
            src="english-teaching.jpeg"
        >

    </div>

    <script>

        const image = document.getElementById("proofImage");

        image.onclick = () => {

            image.classList.toggle("zoomed");
        };

    </script>

</body>

</html>
